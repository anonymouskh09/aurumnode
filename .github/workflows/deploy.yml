name: Deploy to VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH (from base64 key)
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        shell: bash
        run: |
          ssh -o StrictHostKeyChecking=yes "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
          set -e

          cd "${APP_DIR}"

          echo "== Pull latest code =="
          git fetch --all
          git reset --hard origin/main

          echo "== Install PHP deps =="
          if ! command -v composer >/dev/null 2>&1; then
            echo "Composer not found"; exit 1
          fi
          composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

          echo "== Ensure permissions =="
          chown -R www-data:www-data .
          chmod -R 775 storage bootstrap/cache

          echo "== Laravel optimize & migrate =="
          php artisan config:clear || true
          php artisan cache:clear || true
          php artisan route:clear || true
          php artisan view:clear || true
          php artisan migrate --force
          php artisan storage:link || true
          php artisan optimize

          echo "== Build frontend (Vite) if package.json exists =="
          if [ -f package.json ]; then
            if ! command -v npm >/dev/null 2>&1; then
              echo "npm not found"; exit 1
            fi
            npm ci
            npm run build
          fi

          echo "== Restart services (optional) =="
          # If you use PHP-FPM / nginx, uncomment if needed:
          # systemctl restart php8.3-fpm || true
          # systemctl reload nginx || true

          echo "✅ Deploy done"
          EOF
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
